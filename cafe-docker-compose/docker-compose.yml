services:
  # Database MySQL (Multi-database)
  db:
    image: mysql:8.0
    container_name: cafe-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - cafe-network

  # Postgres for Hasura Metadata
  hasura-metadata-db:
    image: postgres:15
    container_name: hasura-metadata-db
    restart: always
    environment:
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - hasura_db_data:/var/lib/postgresql/data
    networks:
      - cafe-network

  # Hasura GraphQL Engine
  hasura:
    image: hasura/graphql-engine:v2.33.0
    container_name: cafe-hasura
    ports:
      - "8080:8080"
    depends_on:
      - hasura-metadata-db
      - db
    restart: always
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:postgrespassword@hasura-metadata-db:5432/postgres
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ADMIN_SECRET: myadminsecretkey
    networks:
      - cafe-network

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cafe-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - cafe-network

  # User Service
  user-service:
    build:
      context: ../userService
    container_name: user-service
    ports:
      - "8000:8000"
    volumes:
      - ../userService:/var/www
    environment:
      DB_HOST: cafe-db
      DB_DATABASE: user_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db
    networks:
      - cafe-network

  # Product Service
  product-service:
    build:
      context: ../productService
    container_name: product-service
    ports:
      - "8001:8001"
    volumes:
      - ../productService:/var/www
    environment:
      DB_HOST: cafe-db
      DB_DATABASE: product_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db
      - rabbitmq
    networks:
      - cafe-network

  # Order Service
  order-service:
    build:
      context: ../orderService
    container_name: order-service
    ports:
      - "8002:8002"
    volumes:
      - ../orderService:/var/www
    environment:
      DB_HOST: cafe-db
      DB_DATABASE: order_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db
      - rabbitmq
      - user-service
      - product-service
    networks:
      - cafe-network

  # Payment Service
  payment-service:
    build:
      context: ../paymentService
    container_name: payment-service
    ports:
      - "8003:8003"
    volumes:
      - ../paymentService:/var/www
    environment:
      DB_HOST: cafe-db
      DB_DATABASE: payment_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - db
      - rabbitmq
    networks:
      - cafe-network

  # Worker Product
  product-worker:
    build:
      context: ../productService
    container_name: product-worker
    command: php artisan queue:work rabbitmq --queue=product_queue
    volumes:
      - ../productService:/var/www
    environment:
      DB_HOST: cafe-db
      DB_DATABASE: product_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - rabbitmq
      - db
    networks:
      - cafe-network

  # Worker Payment
  payment-worker:
    build:
      context: ../paymentService
    container_name: payment-worker
    command: php artisan queue:work rabbitmq --queue=payment_queue
    volumes:
      - ../paymentService:/var/www
    environment:
      DB_HOST: cafe-db
      DB_DATABASE: payment_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      - rabbitmq
      - db
    networks:
      - cafe-network

networks:
  cafe-network:
    driver: bridge

volumes:
  db_data:
  hasura_db_data:
